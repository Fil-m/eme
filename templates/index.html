{% verbatim %}
<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EME OS</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/eme-logo.svg">
    <meta name="theme-color" content="#000000">

    <!-- Tabler CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- Vue3 SFC Loader -->
    <script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader@0.8.4/dist/vue3-sfc-loader.js"></script>
    <!-- jsQR for QR Code scanning -->
    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

    <style>
        :root {
            --eme-accent: #00e5ff;
            --eme-accent2: #6c00ff;
            --eme-grad: linear-gradient(135deg, #00e5ff, #6c00ff);
        }

        [v-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Inter', var(--tblr-font-sans-serif);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .grad-text {
            background: var(--eme-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch((err) => {
                    console.log('SW Registration Failed: ', err);
                });
            });
        }
    </script>
</head>

<body class="antialiased">

    <div id="app" v-cloak>
        <!-- SCREEN: AUTH/SETUP -->
        <eme-auth-screen v-if="view === 'auth' || view === 'setup'" v-model:user="user" :auth="auth"
            @authenticated="loadInitialData" @success="view = 'shell'"></eme-auth-screen>

        <!-- SCREEN: SHELL -->
        <eme-shell-main v-if="view === 'shell'" :nav-items="navItems" :system-settings="systemSettings"
            :custom-apps="customApps" v-model:active-app="activeApp" @logout="logout">
            <!-- DASHBOARD (Shows when no active app) -->
            <eme-dashboard v-show="!activeApp" :user="user" :auth="auth" :nav-items="navItems"
                @open-app="activeApp = $event"></eme-dashboard>

            <!-- APP MODULES -->
            <eme-apps-store v-if="activeApp === 'apps_store'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-apps-store>

            <eme-my-page v-if="activeApp === 'my_page'" :user="user" :visiting-user="visitingUser" :auth="auth"
                @update-user-avatar="user.avatar = $event" @refresh-user="loadInitialData" @return="visitingUser = null"
                @close="activeApp = null"></eme-my-page>

            <eme-gallery v-if="activeApp === 'gallery'" :user="user" :visiting-user="visitingUser" :auth="auth"
                @return="visitingUser = null" @close="activeApp = null"></eme-gallery>

            <eme-network v-if="activeApp === 'network'" :user="user" :auth="auth" @visit-user="visitUser"
                @generate-qr="qrInitialText = $event; activeApp = 'qr_generator'"
                @close="activeApp = null"></eme-network>

            <eme-settings v-if="activeApp === 'settings'" v-model:user="user" v-model:system-settings="systemSettings"
                :auth="auth" :nav-items="navItems" @refresh-user="loadInitialData"
                @close="activeApp = null"></eme-settings>

            <eme-projects v-if="activeApp === 'projects'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-projects>

            <eme-clone-master v-if="activeApp === 'clone_master'" :user="user" :auth="auth"
                @open-kb="kbArticleId = $event.articleId; activeApp = 'kb'"
                @close="activeApp = null"></eme-clone-master>

            <eme-kb v-if="activeApp === 'kb'" :user="user" :auth="auth" :initial-article-id="kbArticleId"
                @close="activeApp = null; kbArticleId = null"></eme-kb>

            <eme-chat v-if="activeApp === 'chat'" :user="user" :auth="auth" @close="activeApp = null"></eme-chat>

            <eme-qr-generator v-if="activeApp === 'qr_generator'" :user="user" :auth="auth"
                :initial-text="qrInitialText" @close="activeApp = null; qrInitialText = ''"></eme-qr-generator>

            <eme-park-adventures v-if="activeApp === 'park_adventures'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-park-adventures>

            <eme-park-adventures-admin v-if="activeApp === 'park_adventures_admin'" :user="user"
                :auth="auth"></eme-park-adventures-admin>

            <eme-mafia v-if="activeApp === 'mafia'" :user="user" :auth="auth" @close="activeApp = null"></eme-mafia>

            <eme-omni-tools v-if="activeApp === 'omni_tools'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-omni-tools>

            <eme-microbin v-if="activeApp === 'microbin'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-microbin>

            <eme-bookmarks v-if="activeApp === 'bookmarks'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-bookmarks>

            <eme-memos v-if="activeApp === 'memos'" :user="user" :auth="auth" @close="activeApp = null"></eme-memos>

            <eme-sys-mon v-if="activeApp === 'sysmon'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-sys-mon>

            <eme-open-web-ui v-if="activeApp === 'open_webui'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-open-web-ui>

            <eme-vikunja v-if="activeApp === 'vikunja'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-vikunja>

            <eme-syncthing v-if="activeApp === 'syncthing'" :user="user" :auth="auth"
                @close="activeApp = null"></eme-syncthing>

            <!-- DYNAMIC MODULAR APPS -->
            <eme-modular-app v-if="activeApp && typeof activeApp === 'object' && activeApp.type === 'custom_app'"
                :user="user" :auth="auth" :app-config="activeApp" :system-settings="systemSettings"
                @visit-user="visitUser" @generate-qr="qrInitialText = $event; activeApp = 'qr_generator'"
                @close="activeApp = null"></eme-modular-app>

        </eme-shell-main>
    </div>

    <script>
        const { createApp, defineAsyncComponent } = Vue;
        const { loadModule } = window['vue3-sfc-loader'];

        const appVersion = Date.now();
        const loaderOptions = {
            moduleCache: { vue: Vue },
            async getFile(url) {
                const finalUrl = url.includes('?') ? `${url}&v=${appVersion}` : `${url}?v=${appVersion}`;
                try {
                    const res = await fetch(finalUrl);
                    if (!res.ok) throw Object.assign(new Error(res.statusText + ' ' + finalUrl), { res });
                    return {
                        getContentData: (asBinary) => asBinary ? res.arrayBuffer() : res.text(),
                    };
                } catch (e) {
                    alert(`VUE LOADER ERROR: Не вдалося завантажити файл ${finalUrl}. Якщо у вас увімкнений блокувальник реклами (AdBlock), він міг заблокувати слово 'chat'.`);
                    throw e;
                }
            },
            addStyle(textContent) {
                const style = document.createElement('style');
                style.textContent = textContent;
                const ref = document.head.getElementsByTagName('style')[0] || null;
                document.head.insertBefore(style, ref);
            },
        };

        const app = createApp({
            data() {
                return {
                    view: 'auth',
                    user: {},
                    navItems: [],
                    systemSettings: {},
                    customApps: [],
                    activeApp: 'apps_store',
                    kbArticleId: null,
                    visitingUser: null,
                    qrInitialText: ''
                }
            },
            methods: {
                auth() {
                    const token = localStorage.getItem('access_token');
                    if (!token || token === 'undefined' || token === 'null') return {};
                    return { 'Authorization': 'Bearer ' + token };
                },
                async loadInitialData() {
                    try {
                        const [uRes, navRes, setRes, appsRes] = await Promise.all([
                            fetch('/api/profiles/me/', { headers: this.auth() }),
                            fetch('/api/nav/items/', { headers: this.auth() }),
                            fetch('/api/settings/me/', { headers: this.auth() }),
                            fetch('/api/settings/apps/', { headers: this.auth() })
                        ]);

                        if (uRes.status === 401 || navRes.status === 401 || setRes.status === 401) {
                            console.warn("Token rejected (401). Forcing logout.");
                            localStorage.removeItem('access_token');
                            localStorage.removeItem('refresh_token');
                            this.view = 'auth';
                            return;
                        }

                        this.user = await uRes.json();
                        const navData = await navRes.json();
                        this.navItems = navData.results || navData;
                        this.systemSettings = await setRes.json();
                        const appsData = await appsRes.json();
                        this.customApps = appsData.results || appsData;
                    } catch (e) {
                        console.error('Data load error', e);
                        alert("Критична помилка завантаження даних EME OS: " + e.message);
                    }
                },
                async logout() {
                    const refresh = localStorage.getItem('refresh_token');
                    if (refresh) {
                        try {
                            await fetch('/api/profiles/logout/', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', ...this.auth() },
                                body: JSON.stringify({ refresh })
                            });
                        } catch (e) { }
                    }
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    this.view = 'auth';
                    this.activeApp = null;
                },
                visitUser(u) {
                    this.visitingUser = u;
                    this.activeApp = 'my_page';
                }
            },
            async mounted() {
                const token = localStorage.getItem('access_token');
                if (token && token !== 'undefined') {
                    await this.loadInitialData();
                    if (this.user.id && this.view !== 'auth') {
                        this.view = 'shell';
                        // Heartbeat
                        setInterval(() => {
                            fetch('/api/network/heartbeat/', { method: 'POST', headers: this.auth() }).catch(() => { });
                        }, 30000);
                    } else {
                        localStorage.removeItem('access_token');
                    }
                }
            }
        });

        // Register components
        const components = [
            'EmeAuthScreen', 'EmeShellMain', 'EmeDashboard', 'EmeWidgetClock', 'EmeAppsStore',
            'EmeGallery', 'EmeNetwork', 'EmeSettings', 'EmeProjects', 'EmeCloneMaster',
            'EmeProjectDetail', 'EmeKb', 'EmeChat', 'EmeQrGenerator', 'EmeParkAdventures', 'EmeParkAdventuresAdmin', 'EmeMafia',
            'EmeOmniTools', 'EmeMicrobin', 'EmeBookmarks', 'EmeMemos', 'EmeSysMon',
            'EmeOpenWebUI', 'EmeVikunja', 'EmeSyncthing', 'EmeModularApp', 'EmeProfile', 'EmeIndexer', 'EmeAIBuilder', 'EmeUserwalllight'
        ];

        components.forEach(name => {
            const tagName = name.replace(/[A-Z]/g, m => "-" + m.toLowerCase()).replace(/^-/, "");
            app.component(tagName, defineAsyncComponent(() => loadModule(`/static/components/${name}.vue`, loaderOptions)));
        });

        // Global error handler to catch silently failing crashes
        app.config.errorHandler = (err, instance, info) => {
            alert("VUE CRASH: " + err.message + "\n(Info: " + info + ")");
            console.error("Global Vue Error:", err, info);
        };

        app.mount('#app');
    </script>

    <!-- Tabler JS -->
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
</body>

</html>
{% endverbatim %}
